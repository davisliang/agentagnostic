# gsm_plus_mini — imported from routerllm by scripts/import_routerllm_benchmarks.py
name: gsm_plus_mini
description: >-
  Solve a GSM-Plus grade-school maths word problem, including adversarial perturbations of the original GSM8K wording. The answer is a single number.
source_dataset: qintongli/GSM-Plus
num_fewshot: 5
examples: 200
sampled_from: 200
routerllm_grader: exact
grading_supported: true
# routerllm allocated a holdout for this task; the rows below labeled
# "split": "test" are the holdout examples present in the export, and the
# optimizer uses exactly those as its test split — the same examples the
# baselines were measured on. Partial coverage means the export was itself
# a sample; zero means the export's doc_ids could not be matched.
holdout_in_data: 17 of 259
# Rows labeled train/val carry routerllm's own 80/10/10 partition (via
# split.json): the optimizer draws its train split from train-labeled rows
# and its dev split from val-labeled rows, so no example crosses a
# partition boundary.
split_labeled: 162 train / 21 val / 17 test
check_type: exact
# routerllm's holdout numbers, recomputed from joined_14.jsonl.
# Comparable only if graded the same way — see grading_note.
baselines:
  n: 259
  haiku: 0.749
  opus: 0.7992
  router: 0.8031
  oracle: 0.8224
