<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>workflow optimizer</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { background:#0e1116; color:#cfd6e4; font:13px/1.45 -apple-system,BlinkMacSystemFont,system-ui,sans-serif; margin:0; }
  header { padding:10px 18px; background:#161b22; border-bottom:1px solid #2a313c; display:flex; align-items:center; gap:14px; }
  header h1 { font-size:14px; margin:0; color:#7dd3fc; font-weight:600; letter-spacing:.5px; }
  header .meta { color:#8b95a7; font-size:12px; }
  header .spacer { margin-left:auto; }
  label.toggle { color:#8b95a7; font-size:12px; cursor:pointer; }
  main { display:grid; grid-template-columns: auto 1fr; height: calc(100vh - 41px); }
  #runs { border-right:1px solid #2a313c; padding:10px; overflow-y:auto;
          width:320px; min-width:220px; max-width:600px; resize:horizontal; }
  #detail { padding:14px 22px; overflow-y:auto; }
  .empty { color:#5b667a; font-style:italic; padding:8px 2px; }

  button { background:#1d2742; color:#cfd6e4; border:1px solid #2f3e63; border-radius:6px;
           padding:6px 12px; font:inherit; font-size:12px; cursor:pointer; }
  button:hover { background:#24314f; }
  button.primary { background:#164e33; border-color:#1e7a4d; color:#86efac; font-weight:600; }
  button.primary:hover { background:#1a5c3c; }
  button.danger { background:#3a1a1a; border-color:#6d2b2b; color:#fca5a5; }
  button.danger:hover { background:#4a2020; }
  button:disabled { opacity:.45; cursor:not-allowed; }
  input, select { background:#0a0e14; color:#cfd6e4; border:1px solid #2a313c; border-radius:4px;
                  padding:5px 7px; font:inherit; font-size:12px; width:100%; }

  .run { padding:8px 10px; border-radius:6px; cursor:pointer; margin-bottom:4px; border:1px solid transparent; }
  .run:hover { background:#1a2030; }
  .run.active { background:#1d2742; border-color:#2f3e63; }
  .run .id { font-weight:600; color:#dde3ef; font-size:12px; word-break:break-all; }
  .run .sub { font-size:11px; color:#7c8699; margin-top:3px; display:flex; gap:8px; align-items:center; }

  .pill { padding:2px 8px; border-radius:12px; font-size:10px; font-weight:600;
          text-transform:uppercase; letter-spacing:.4px; border:1px solid #2a313c;
          background:#1a2030; color:#7c8699; white-space:nowrap; }
  .pill.running { background:#3a2a14; color:#fbbf24; border-color:#7a5018; animation:pulse 1.5s infinite; }
  .pill.done    { background:#143123; color:#86efac; border-color:#1e5235; }
  .pill.failed  { background:#2a1414; color:#fca5a5; border-color:#6d2b2b; }
  .pill.stopped { background:#241a2e; color:#c4b5fd; border-color:#4c3a63; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }

  .phases { display:flex; gap:4px; margin:12px 0 16px; flex-wrap:wrap; }
  .phase { padding:4px 10px; border-radius:14px; background:#1a2030; color:#7c8699;
           font-size:11px; border:1px solid #2a313c; }
  .phase.done   { background:#143123; color:#86efac; border-color:#1e5235; }
  .phase.active { background:#3a2a14; color:#fbbf24; border-color:#7a5018; animation:pulse 1.5s infinite; }

  h2 { font-size:13px; color:#7dd3fc; margin:18px 0 8px; text-transform:uppercase;
       letter-spacing:.5px; font-weight:600; }
  .card { background:#161b22; border:1px solid #2a313c; border-radius:6px; padding:10px 12px; }
  .grid4 { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .stat { font-size:17px; color:#dde3ef; }
  .stat .lbl { font-size:10px; color:#7c8699; text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }

  table { width:100%; border-collapse:collapse; font-size:12px; }
  th, td { text-align:left; padding:5px 8px; border-bottom:1px solid #1d242e; }
  th { color:#7c8699; font-weight:500; font-size:10px; text-transform:uppercase; letter-spacing:.4px; }
  td.num { text-align:right; font-family:ui-monospace,Menlo,monospace; }
  tr.cand { cursor:pointer; }
  tr.cand:hover td { background:#1a2030; }
  tr.cand.sel td { background:#1d2742; }
  .name { font-family:ui-monospace,Menlo,monospace; color:#dde3ef; }
  .tag { font-size:10px; padding:1px 6px; border-radius:10px; background:#143123;
         color:#86efac; border:1px solid #1e5235; margin-left:6px; }
  .warn { color:#fca5a5; }

  pre { background:#0a0e14; border:1px solid #2a313c; border-radius:4px; padding:10px;
        overflow:auto; max-height:340px; white-space:pre-wrap; word-break:break-word;
        font:11px/1.5 ui-monospace,Menlo,monospace; color:#bdc4d3; margin:0; }
  .desc { color:#8b95a7; font-size:12px; margin:6px 0 8px; line-height:1.5; }

  /* verbose views */
  details { background:#161b22; border:1px solid #2a313c; border-radius:6px; margin-bottom:6px; }
  details > summary { cursor:pointer; padding:8px 12px; color:#dde3ef; font-size:12px;
                      list-style:none; display:flex; gap:10px; align-items:baseline; }
  details > summary::-webkit-details-marker { display:none; }
  details > summary:before { content:"▸"; color:#5b667a; font-size:10px; }
  details[open] > summary:before { content:"▾"; }
  details > summary:hover { background:#1a2030; }
  details .inner { padding:0 12px 12px; }
  .ex-score { font-family:ui-monospace,Menlo,monospace; font-size:11px; }
  .ex-score.pass { color:#86efac; } .ex-score.fail { color:#fca5a5; }
  .ex-score.part { color:#fbbf24; }
  .ex-q { color:#8b95a7; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .call { border-left:2px solid #2f3e63; padding-left:10px; margin:10px 0; }
  .call .hd { display:flex; gap:10px; align-items:baseline; font-size:11px; margin-bottom:4px; }
  .call .model { color:#7dd3fc; font-family:ui-monospace,Menlo,monospace; font-weight:600; }
  .call .cost { color:#7c8699; margin-left:auto; font-family:ui-monospace,Menlo,monospace; }
  .io-lbl { font-size:10px; color:#7c8699; text-transform:uppercase; letter-spacing:.5px; margin:6px 0 3px; }
  .clip { color:#fbbf24; font-size:10px; font-style:italic; }
  .tabs { display:flex; gap:6px; margin:10px 0 8px; flex-wrap:wrap; }
  .tab { padding:4px 12px; border-radius:6px; background:#161b22; border:1px solid #2a313c;
         color:#8b95a7; font-size:11px; cursor:pointer; }
  .tab:hover { background:#1a2030; }
  .tab.on { background:#1d2742; border-color:#2f3e63; color:#dde3ef; }

  form.newrun { display:grid; grid-template-columns:1fr 1fr; gap:8px 10px; margin-bottom:10px; }
  form.newrun .full { grid-column:1 / -1; }
  form.newrun label { display:block; font-size:10px; color:#7c8699; text-transform:uppercase;
                      letter-spacing:.4px; margin-bottom:3px; }
  .note { color:#fbbf24; font-size:11px; margin-top:6px; }
  .estimate { margin-top:10px; border-top:1px solid #2a313c; padding-top:8px; color:#8b95a7; font-size:11px; }
  .estimate .big { font-size:18px; color:#86efac; font-weight:600; }
  .estimate .rng { font-size:11px; color:#7c8699; font-weight:400; margin-left:6px; }
  .estimate .lines { margin:6px 0; }
  .estimate .ln { display:flex; justify-content:space-between; padding:1px 0;
                  font-family:ui-monospace,Menlo,monospace; color:#bdc4d3; }
  .estimate details { background:none; border:none; margin:4px 0 0; }
  .estimate details > summary { padding:2px 0; color:#7dd3fc; font-size:11px; }
  .estimate details .inner { padding:0; }
  .answers-scroll { max-height:70vh; overflow:auto; }
  table.answers { border-collapse:separate; border-spacing:0; }
  table.answers td, table.answers th { vertical-align:top; }
  /* header row: frozen to the top of the scroll box */
  table.answers thead th { position:sticky; top:0; z-index:2; background:#12161d;
                           border-bottom:1px solid #2a313c; }
  /* question column: frozen to the left */
  table.answers th.qhead, table.answers td.aq { position:sticky; left:0; background:#12161d;
                           border-right:1px solid #2a313c; }
  table.answers th.qhead { z-index:3; }        /* the corner sits above both */
  table.answers .acol { min-width:190px; font-family:ui-monospace,Menlo,monospace;
                        color:#dde3ef; text-transform:none; font-size:11px; }
  table.answers .aq { max-width:280px; min-width:220px; font-size:11px; color:#8b95a7; }
  table.answers .aq details { background:none; border:none; margin:0; }
  table.answers .aq summary { padding:2px 0; color:#bdc4d3; }
  .acell { border-left:1px solid #1d242e; }
  .acell .asc { font-family:ui-monospace,Menlo,monospace; font-size:11px; font-weight:600; }
  .acell.pass .asc { color:#86efac; } .acell.fail .asc { color:#fca5a5; }
  .acell.part .asc { color:#fbbf24; }
  .acell .atxt { color:#8b95a7; font-size:11px; white-space:pre-wrap; word-break:break-word;
                 max-height:120px; overflow:auto; margin-top:2px;
                 font-family:ui-monospace,Menlo,monospace; }
  .tip { position:absolute; display:none; pointer-events:none; background:#0a0e14;
         border:1px solid #2f3e63; border-radius:6px; padding:8px 10px; font-size:11px;
         line-height:1.55; color:#cfd6e4; max-width:320px; z-index:5; }
  .err { color:#fca5a5; font-size:12px; margin-top:6px; }
</style>
</head>
<body>
<header>
  <h1>workflow optimizer</h1>
  <span class="meta" id="summary">—</span>
  <span class="tab on" id="tab-runs" onclick="setView('runs')">runs</span>
  <span class="tab" id="tab-compare" onclick="setView('compare')">compare</span>
  <span class="spacer"></span>
  <label class="toggle"><input type="checkbox" id="autorefresh" checked> auto-refresh 3s</label>
</header>
<main>
  <aside id="runs">
    <button class="primary" style="width:100%;margin-bottom:10px" id="newbtn">+ new search</button>
    <div id="newslot"></div>
    <div id="runlist"><div class="empty">loading…</div></div>
  </aside>
  <section id="detail"><div class="empty">select a run, or start a new one</div></section>
</main>

<script>
const PHASES = ["queued","analyzing","researching","designing","ranking","done"];
let activeId = null, timer = null, selectedCandidate = null, showNew = false;
let candView = "code", traceCache = null, logLines = 400;   // verbose-view state
let view = "runs", newMode = "benchmark", uploaded = null, benchmarks = [];
let workflowTools = [], toolChoice = null;   // null = use the task default
let extraSkills = null, workingSkills = null;   // extras beyond the core set; null = untouched
let compareTask = "", comparePoints = [];
let answersSplit = "", answersData = null;   // side-by-side answers, "" = closed
let frontierPoints = [], hoveringChart = false;   // hovering pauses the refresh
let chartSplit = "test";   // which split the run-detail chart shows
let hiddenRounds = new Set();   // design rounds toggled off in the run-detail chart

const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const usd = n => n == null ? "—" : "$" + Number(n).toFixed(5);
const pct = n => n == null ? "—" : (Number(n) * 100).toFixed(0) + "%";
const acc = n => n == null ? "—" : Number(n).toFixed(2);

function elapsed(s) {
  if (!s.started_at) return "—";
  const end = s.ended_at || Date.now() / 1000;
  const secs = Math.max(0, Math.round(end - s.started_at));
  return secs < 60 ? secs + "s" : Math.floor(secs / 60) + "m " + (secs % 60) + "s";
}

// ---- run list ---------------------------------------------------------------
// Polling only replaces #runlist. The new-search form lives in its own node and
// is rendered on toggle, never on a tick — otherwise the refresh would destroy
// the form (and whatever you were typing into it) every three seconds.
async function loadRuns() {
  const data = await (await fetch("/api/runs")).json();
  const runs = data.runs || [];
  const live = runs.filter(r => r.state === "running").length;
  document.getElementById("summary").textContent =
    `${runs.length} run${runs.length === 1 ? "" : "s"}` + (live ? ` · ${live} running` : "");
  document.getElementById("runlist").innerHTML =
    runs.length ? runs.map(runRow).join("") : `<div class="empty">no runs yet</div>`;
}

function runRow(r) {
  return `<div class="run ${r.run_id === activeId ? "active" : ""}" onclick="select('${esc(r.run_id)}')">
    <div class="id">${esc(r.run_id)}</div>
    <div class="sub">
      <span class="pill ${esc(r.state)}">${esc(r.state === "running" ? r.phase : r.state)}</span>
      <span>${r.n_candidates || 0} cand</span>
      <span>${elapsed(r)}</span>
    </div></div>`;
}

// ---- new search form --------------------------------------------------------
function newRunForm() {
  return `<div class="card" style="margin-bottom:12px">
    <div class="tabs">
      <span class="tab ${newMode === "benchmark" ? "on" : ""}" onclick="setNewMode('benchmark')">benchmark</span>
      <span class="tab ${newMode === "prompt" ? "on" : ""}" onclick="setNewMode('prompt')">describe a task</span>
    </div>
    <form class="newrun" onsubmit="return startRun(event)" oninput="scheduleEstimate()">
      <div class="full" id="f-source"></div>
      <div><label>design rounds</label><input id="f-rounds" type="number" min="1" max="10" value="2"></div>
      <div><label>examples</label><input id="f-examples" type="number" min="2" max="500" value="40"></div>
      <div><label>concurrency</label><input id="f-concurrency" type="number" min="1" max="32" value="8"></div>
      <div><label title="Which workflow gets recommended, and the target the designer aims at. It does not cap what the search spends.">budget $/query <span style="color:#5b667a">ⓘ</span></label>
        <input id="f-budget" type="number" step="0.0001" value="0.002"></div>
      <div class="full" id="f-tools"></div>
      <div class="full" id="f-skills"></div>
      <div class="full"><button class="primary" type="submit" id="f-go">start search</button></div>
    </form>
    <div id="f-cost" class="estimate">estimating…</div>
    <div class="err" id="f-err"></div>
  </div>`;
}

async function fillTasks() {
  const slot = document.getElementById("f-source");
  if (!slot) return;
  if (!benchmarks.length) {
    const data = await (await fetch("/api/tasks")).json();
    benchmarks = data.benchmarks || [];
    window._tasks = data.tasks || [];
    workflowTools = data.workflow_tools || [];
    window._defaultTools = data.default_tools || [];
    window._skills = data.skills || [];
    window._defaultWorking = !!data.default_working_skills;
  }
  slot.innerHTML = newMode === "benchmark" ? benchmarkPicker() : promptFields();
  if (newMode === "benchmark") describeTask();
  renderTools();
  renderSkills();
}

// Which server-side tools a workflow may call. Left at the task default unless
// touched; unchecking web_search makes a benchmark closed-book, so its numbers
// stay comparable to a closed-book baseline.
// A checkbox per server-side tool from the registry — tick one to grant a
// workflow access to it. What each does: web_search finds pages (issues a query,
// returns results), web_fetch reads a page already in the prompt, code_execution
// runs Python.
const TOOL_HELP = {
  web_search: "search the web — finds pages and new URLs from a query",
  web_fetch: "fetch a URL already in the prompt — reads one page in full",
  code_execution: "run Python in a sandbox",
};

function renderTools() {
  const box = document.getElementById("f-tools");
  if (!box) return;
  const current = toolChoice || defaultTools();
  box.innerHTML = `<label>tools workflows may use</label>
    <div style="display:flex;flex-direction:column;gap:4px">` +
    workflowTools.map(name => `<label style="display:flex;gap:6px;align-items:baseline;
        text-transform:none;color:#bdc4d3;font-size:12px;margin:0">
      <input type="checkbox" data-tool="${esc(name)}" ${current.includes(name) ? "checked" : ""}
        onchange="toggleTool('${esc(name)}',this.checked)" style="width:auto;flex:none">
      <span><span style="font-family:ui-monospace,Menlo,monospace">${esc(name)}</span>
        <span style="color:#7c8699"> — ${esc(TOOL_HELP[name] || "")}</span></span></label>`).join("") +
    `</div>
    <div class="desc" style="margin-top:4px">Untick all for a closed-book task, so no
       candidate can look answers up or run code — the design agent is told what's available.
       The web tools bundle their own code execution, so they can't be combined with
       code_execution in one call.</div>`;
}

function toggleTool(name, on) {
  const base = (toolChoice || defaultTools()).slice();
  toolChoice = on ? [...new Set([...base, name])] : base.filter(t => t !== name);
}

function defaultTools() {
  if (newMode === "benchmark") {
    const b = benchmarks.find(x => x.name === (document.getElementById("f-task")||{}).value);
    if (b && b.tools) return b.tools;
  }
  return window._defaultTools || [];
}

// Which skills the design agent is staged with. The core set is locked on: the
// round prompt drives the agent through those skills BY NAME, so a form that
// could drop one would produce agents told to use a skill they don't have —
// every candidate malformed, the whole round paid for and wasted. The form only
// ADDS skills (a folder you create under skills/<name>/SKILL.md appears here);
// removing core skills is a config-level decision.
function renderSkills() {
  const box = document.getElementById("f-skills");
  if (!box) return;
  const extras = extraSkills || [];
  const working = workingSkills == null ? (window._defaultWorking || false) : workingSkills;
  const row = (inner, extra) => `<label style="display:flex;gap:6px;align-items:baseline;
      text-transform:none;color:#bdc4d3;font-size:12px;margin:0${extra || ""}">${inner}</label>`;
  const clipDesc = d => esc(d.slice(0, 110)) + (d.length > 110 ? "…" : "");
  const optional = (window._skills || []).filter(s => !s.required);
  box.innerHTML = `<label>skills the design agent is staged with</label>
    <div style="display:flex;flex-direction:column;gap:4px">` +
    (window._skills || []).filter(s => s.required).map(s => row(
      `<input type="checkbox" checked disabled style="width:auto;flex:none">
       <span><span style="font-family:ui-monospace,Menlo,monospace">${esc(s.name)}</span>
         <span style="color:#7c8699"> — ${clipDesc(s.description)}</span></span>`)).join("") +
    optional.map(s => row(
      `<input type="checkbox" ${extras.includes(s.name) ? "checked" : ""}
         onchange="toggleSkill('${esc(s.name)}',this.checked)" style="width:auto;flex:none">
       <span><span style="font-family:ui-monospace,Menlo,monospace">${esc(s.name)}</span>
         <span style="color:#7c8699"> — ${clipDesc(s.description)}</span></span>`)).join("") +
    row(`<input type="checkbox" ${working ? "checked" : ""}
         onchange="workingSkills=this.checked" style="width:auto;flex:none">
       <span><span style="font-family:ui-monospace,Menlo,monospace">working skills</span>
         <span style="color:#7c8699"> — the agent also keeps a run-scoped skills folder it writes and
         re-reads across rounds: lessons as SKILL.md notes, plus operators in helpers.py its
         workflows can call by name</span></span>`, ";margin-top:4px") +
    `</div>
    <div class="desc" style="margin-top:4px">The ticked-and-locked skills are the methodology —
      the design prompt drives the agent through them by name, so they always stage.
      ${optional.length ? "Tick an extra to stage it too." :
        "Add your own under <code>skills/&lt;name&gt;/SKILL.md</code> and it appears here as an option."}</div>`;
}

function toggleSkill(name, on) {
  const base = (extraSkills || []).slice();
  extraSkills = on ? [...new Set([...base, name])] : base.filter(s => s !== name);
}



function benchmarkPicker() {
  const known = new Set(benchmarks.map(b => b.name));
  const options = (window._tasks || []).map(name => {
    const b = benchmarks.find(x => x.name === name);
    const label = b ? `${name} — ${b.examples} ex, ${b.grader}` : name;
    return `<option value="${esc(name)}">${esc(label)}</option>`;
  }).join("");
  const unsupported = benchmarks.filter(b => !b.supported);
  return `<label>task or benchmark</label>
    <select id="f-task" onchange="describeTask();renderTools();scheduleEstimate()">${options}</select>
    <div class="desc" id="f-desc"></div>` +
    (unsupported.length ? `<div class="note">not runnable here: ` +
      unsupported.map(b => `${esc(b.name)} (${esc(b.note)})`).join("; ") + `</div>` : "");
}

function describeTask() {
  const sel = document.getElementById("f-task"), out = document.getElementById("f-desc");
  if (!sel || !out) return;
  const b = benchmarks.find(x => x.name === sel.value);
  if (!b) { out.textContent = "a task config from config/task/"; return; }
  const base = b.baselines || {};
  const refs = base.haiku != null
    ? ` · routerllm: haiku ${acc(base.haiku)} · opus ${acc(base.opus)} · router ${acc(base.router)} · oracle ${acc(base.oracle)}`
    : "";
  out.innerHTML = esc(b.description) +
    `<div style="margin-top:4px;color:#7c8699">${b.examples} examples` +
    (b.sampled_from && b.sampled_from !== b.examples ? ` (sampled from ${b.sampled_from})` : "") +
    esc(refs) + `</div>`;
}

function promptFields() {
  return `<label>describe the task</label>
    <textarea id="f-prompt" rows="4" placeholder="e.g. Classify a support email as billing, technical, or account. Answer with the label alone."
      style="width:100%;background:#0a0e14;color:#cfd6e4;border:1px solid #2a313c;border-radius:4px;padding:6px;font:inherit;font-size:12px"></textarea>
    <label style="margin-top:8px">dataset (optional)</label>
    <input type="file" id="f-file" accept=".jsonl,.json,.txt" onchange="readUpload(event)">
    <div class="desc" id="f-fileinfo">JSONL or a JSON array, one object per example with
      <code>question</code> and <code>answer</code>. Leave empty and examples are generated.</div>`;
}

function setNewMode(mode) {
  newMode = mode; uploaded = null;
  document.getElementById("newslot").innerHTML = newRunForm();
  fillTasks(); scheduleEstimate();
}

// ---- what this will cost, before committing to it ---------------------------
// Debounced: every keystroke in the form would otherwise re-request it.
let estimateTimer = null;
function scheduleEstimate() {
  clearTimeout(estimateTimer);
  estimateTimer = setTimeout(loadEstimate, 250);
}

async function loadEstimate() {
  const box = document.getElementById("f-cost");
  if (!box) return;
  const params = new URLSearchParams();
  if (newMode === "benchmark") {
    const sel = document.getElementById("f-task");
    params.set("task", sel ? sel.value : "");
  } else {
    params.set("freetext", "1");
    params.set("has_dataset", uploaded ? "1" : "0");
  }
  for (const [id, key] of [["f-rounds", "designer.rounds"], ["f-examples", "data.n_examples"],
                           ["f-concurrency", "runtime.concurrency"],
                           ["f-budget", "report.max_cost_per_query"]]) {
    const el = document.getElementById(id);
    if (el && el.value !== "") params.set(key, el.value);
  }
  const e = await (await fetch("/api/estimate?" + params)).json();
  if (e.error) { box.innerHTML = `<span class="err">${esc(e.error)}</span>`; return; }
  renderEstimate(e);
}

function renderEstimate(e) {
  const box = document.getElementById("f-cost");
  if (!box) return;
  const rows = Object.entries(e.breakdown)
    .sort((a, b) => b[1] - a[1])
    .map(([k, v]) => `<div class="ln"><span>${esc(k)}</span><span>$${v.toFixed(2)}</span></div>`)
    .join("");
  const p = e.probe;
  // Probing needs a task with a dataset to call against; a described-in-prose
  // task has no examples until the run generates them, so no button there.
  const probeLine = !p ? (newMode === "benchmark"
      ? `<button type="button" onclick="runProbe()" id="probe-btn"
        style="margin-top:6px;font-size:11px">measure this task (~$0.03, a few seconds)</button>`
      : "")
    : p.skipped ? `<div class="note">${esc(p.skipped)}</div>`
    : `<div style="color:#86efac;margin-top:4px">measured: ${p.n} call(s) on
        ${esc(p.model)} — ${p.input_tokens.toFixed(0)} in / ${p.output_tokens.toFixed(0)} out
        tokens, cheap-model accuracy ${acc(p.accuracy)} (probe cost $${p.cost.toFixed(4)})</div>`;

  box.innerHTML = `
    <div class="big">≈ $${e.expected.toFixed(2)}
      <span class="rng">$${e.low.toFixed(2)} – $${e.high.toFixed(2)}</span></div>
    <div class="lines">${rows}</div>
    <details><summary>what this assumes${e.based_on_runs
        ? ` · ${e.based_on_runs} past run(s) measured` : " · nothing measured yet"}</summary>
      <div class="inner"><ul style="margin:6px 0 0 14px;padding:0;color:#8b95a7">` +
      e.assumptions.map(a => `<li>${esc(a)}</li>`).join("") + `</ul></div></details>
    ${probeLine}
    <div class="note">A real estimate, not a cap. Budget $/query steers which
      workflow is recommended, not what the search spends — the levers are rounds
      and examples.</div>`;
}

// Measuring beats guessing: a few real calls pin this task's token scale and
// whether the cheap model can do it at all, which is what actually drives cost.
async function runProbe() {
  const btn = document.getElementById("probe-btn");
  if (btn) { btn.disabled = true; btn.textContent = "measuring…"; }
  const overrides = {};
  for (const [id, key] of [["f-rounds", "designer.rounds"], ["f-examples", "data.n_examples"],
                           ["f-concurrency", "runtime.concurrency"],
                           ["f-budget", "report.max_cost_per_query"]]) {
    const el = document.getElementById(id);
    if (el && el.value !== "") overrides[key] = el.value;
  }
  const sel = document.getElementById("f-task");
  const e = await (await fetch("/api/probe", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({task: sel ? sel.value : "", overrides}),
  })).json();
  if (e.error) {
    document.getElementById("f-cost").innerHTML = `<span class="err">${esc(e.error)}</span>`;
    return;
  }
  renderEstimate(e);
}

function readUpload(ev) {
  const file = ev.target.files && ev.target.files[0];
  const info = document.getElementById("f-fileinfo");
  if (!file) { uploaded = null; return; }
  const reader = new FileReader();
  reader.onload = () => {
    uploaded = reader.result;
    const lines = uploaded.trim().split("\n").filter(Boolean).length;
    info.innerHTML = `<span style="color:#86efac">${esc(file.name)}</span> — ${lines} line(s) read.
      The server validates it when the search starts.`;
  };
  reader.readAsText(file);
}

function toggleNew() {
  showNew = !showNew;
  document.getElementById("newslot").innerHTML = showNew ? newRunForm() : "";
  document.getElementById("newbtn").textContent = showNew ? "− cancel" : "+ new search";
  if (showNew) { fillTasks(); scheduleEstimate(); }
}

async function startRun(ev) {
  ev.preventDefault();
  const go = document.getElementById("f-go");
  go.disabled = true; go.textContent = "starting…";
  const body = {
    task: newMode === "benchmark" ? document.getElementById("f-task").value : "",
    prompt: newMode === "prompt" ? (document.getElementById("f-prompt").value || "") : "",
    dataset: newMode === "prompt" ? (uploaded || "") : "",
    tools: toolChoice,
    extra_skills: extraSkills,
    working_skills: workingSkills,
    overrides: {
      "designer.rounds": document.getElementById("f-rounds").value,
      "data.n_examples": document.getElementById("f-examples").value,
      "runtime.concurrency": document.getElementById("f-concurrency").value,
      "report.max_cost_per_query": document.getElementById("f-budget").value,
    },
  };
  const res = await (await fetch("/api/runs", {
    method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body),
  })).json();
  if (!res.ok) {
    document.getElementById("f-err").textContent = res.error || "could not start";
    go.disabled = false; go.textContent = "start search";
    return false;
  }
  showNew = false; activeId = res.run_id; selectedCandidate = null;
  document.getElementById("newslot").innerHTML = "";      // close the form on success
  document.getElementById("newbtn").textContent = "+ new search";
  await tick();
  return false;
}

// The continue card sits low in the page; the header button takes you there.
function revealContinue() {
  const card = document.getElementById("cont-card");
  if (card) card.scrollIntoView({behavior: "smooth", block: "start"});
  const nudge = document.getElementById("cont-guidance");
  if (nudge) nudge.focus({preventScroll: true});
}

// The server runs on this machine, so it can hand the run's folder to Finder.
async function openRunDir() {
  if (!activeId) return;
  await fetch(`/api/run/${encodeURIComponent(activeId)}/open`, {method: "POST"});
}

async function continueRun() {
  const rounds = document.getElementById("cont-rounds").value;
  const guidance = document.getElementById("cont-guidance").value;
  const res = await (await fetch(`/api/run/${encodeURIComponent(activeId)}/continue`, {

async function stopRun() {

}

// ---- detail -----------------------------------------------------------------
async function loadDetail() {
  if (!activeId) return;
  if (hoveringChart) return;      // don't re-render out from under a hovering pointer
  const d = await (await fetch("/api/run/" + encodeURIComponent(activeId)
                             + "?log_lines=" + logLines)).json();
  if (d.error) { document.getElementById("detail").innerHTML = `<div class="empty">run not found</div>`; return; }
  const s = d.status, done = s.state !== "running";
  const cands = d.candidates || [];
  const scored = cands.filter(c => c.test);

  const parts = [];
  parts.push(`<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <h2 style="margin:0;text-transform:none;font-family:ui-monospace,Menlo,monospace;cursor:pointer"
          title="open runs/${esc(s.run_id)}/ in the file browser" onclick="openRunDir()"
          >${esc(s.run_id)} <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="#7c8699" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            style="vertical-align:-1px"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2
            2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></h2>
      <span class="pill ${esc(s.state)}">${esc(s.state === "running" ? s.phase : s.state)}</span>
      ${s.state === "running" ? `<button class="danger" onclick="stopRun()">stop</button>`
        : `<button onclick="revealContinue()" title="more design rounds on top of this run's archive">continue…</button>`}
    </div>`);
  if (s.error) parts.push(`<div class="err">${esc(s.error)}</div>`);

  const contEv = (d.events || []).find(e => e.event === "continued_from");
  if (contEv) parts.push(`<div class="desc">continued from
    <span style="color:#7dd3fc;cursor:pointer;font-family:ui-monospace,Menlo,monospace"
      onclick="select('${esc(contEv.source)}')">${esc(contEv.source)}</span>${
    contEv.guidance ? ` — nudge: “${esc(contEv.guidance.slice(0, 200))}${
      contEv.guidance.length > 200 ? "…" : ""}”` : ""}</div>`);

  parts.push(`<div class="phases">` + PHASES.map(p => {
    const at = PHASES.indexOf(s.phase), i = PHASES.indexOf(p);
    const cls = done && s.state === "done" ? "done" : (i < at ? "done" : (i === at ? "active" : ""));
    const label = p === "designing" && s.round ? `designing ${s.round}/${s.rounds}` : p;
    return `<span class="phase ${cls}">${esc(label)}</span>`;
  }).join("") + `</div>`);

  const bestDev = cands.reduce((best, c) => Math.max(best, c.dev?.accuracy ?? -1), -1);
  const bestTest = cands.reduce((best, c) => Math.max(best, c.test?.accuracy ?? -1), -1);
  parts.push(`<div class="grid4">
    ${stat("task", esc(s.task))}
    ${stat("best dev / test acc", `${bestDev >= 0 ? acc(bestDev) : "—"} / ${bestTest >= 0 ? acc(bestTest) : "—"}`)}
    ${stat("dev / test examples", `${s.n_dev || "—"} / ${s.n_test || "—"}`)}
    ${stat("elapsed", elapsed(s))}
  </div>`);

  if (d.analysis && d.analysis.check) {
    parts.push(`<h2>task</h2><div class="card">
      <div><span class="lbl" style="color:#7c8699">grading:</span> <b>${esc(d.analysis.check)}</b>
      ${d.analysis.judge_status ? `<span class="tag">${esc(d.analysis.judge_status)}</span>` : ""}</div>
      <div class="desc">${esc(d.analysis.description)}</div></div>`);
  }

  // What the design agent found others do for this task, before writing any
  // workflow. Open while the research phase is running, collapsed once past it.
  if (d.research) {
    const researching = s.state === "running" && s.phase === "researching";
    parts.push(`<h2>research</h2><details${researching ? " open" : ""}>
      <summary>what the designer found others do for this task, before designing —
        handed to every design round</summary>
      <div class="inner"><pre style="white-space:pre-wrap">${esc(d.research)}</pre></div></details>`);
  }

  // The chart shows ONE split at a time, toggleable. Dev has every candidate,
  // since all are dev-scored; test has only the finalists, since dominated
  // candidates are never re-run on test. Switch to dev to see all the points.
  const devPts = cands.filter(c => c.dev);
  const testPts = cands.filter(c => c.test);
  let split = chartSplit;
  if (split === "test" && !testPts.length) split = "dev";     // nothing on test to show
  const basePts = split === "test" ? testPts : devPts;
  if (basePts.length) {
    // Round chips: toggle which design round's candidates are plotted. Round 0
    // is a continued run's carried archive; the frontier line is recomputed
    // over the visible points, so "what did round 2 alone add" is answerable.
    const rounds = [...new Set(basePts.map(c => c.round ?? -1))].sort((a, b) => a - b);
    const pts = basePts.filter(c => !hiddenRounds.has(c.round ?? -1));
    const tab = (s, label, on) =>
      `<span class="tab ${split === s ? "on" : ""}" style="float:right;text-transform:none;
         margin-left:6px${on ? "" : ";opacity:.4;pointer-events:none"}"
         onclick="setChartSplit('${s}')">${label}</span>`;
    const caption = split === "test"
      ? `<div class="desc">Held-out test scores. Only frontier candidates are re-run on
         test — switch to <b>dev</b> to see every candidate the search tried.</div>`
      : `<div class="desc">Every candidate, scored on dev — the split the search tuned
         against, so read as optimistic.${testPts.length
           ? " Switch to <b>test</b> for held-out numbers on the frontier." : ""}</div>`;
    const roundChips = rounds.length > 1 ? `<div class="tabs" style="margin:2px 0 8px">` +
      rounds.map(r => `<span class="tab ${hiddenRounds.has(r) ? "" : "on"}"
        onclick="toggleRound(${r})">${r === 0 ? "carried" : r === -1 ? "round ?" : "round " + r}</span>`)
        .join("") + `</div>` : "";
    parts.push(`<h2>accuracy vs cost`
      + tab("dev", `dev · all ${devPts.length}`, true)
      + tab("test", "test", testPts.length > 0)
      + `</h2>` + caption + roundChips
      + (pts.length ? frontierSvg(pts, split)
                    : `<div class="empty">every round is toggled off — click a round
                       chip to bring its points back</div>`));
  }

  const convergence = convergenceSvg(d.events || []);
  if (convergence) {
    parts.push(`<h2>convergence by round</h2>
      <div class="desc">Best dev accuracy in the archive after each round — a flat
        segment says that round bought nothing. Use it to decide whether continuing
        is worth another round's money.</div>` + convergence);
  }
  const spend = spendHtml(d);
  if (spend) {
    parts.push(`<h2>where the money went</h2>` + spend);
  }

  if (cands.length) {
    parts.push(`<h2>candidates</h2><div class="card" style="padding:0">
      <table><thead><tr>
        <th>workflow</th><th>round</th><th class="num">dev acc</th><th class="num">dev $/q</th>
        <th class="num">test acc</th><th class="num">test $/q</th><th class="num">cached</th>
      </tr></thead><tbody>` +
      cands.map(c => {
        const onFront = (d.frontier || []).includes(c.name);
        return `<tr class="cand ${selectedCandidate === c.name ? "sel" : ""}" onclick="pick('${esc(c.name)}')">
          <td class="name">${esc(c.name)}${onFront ? `<span class="tag">frontier</span>` : ""}
            ${(c.dev?.errors || []).length ? `<span class="warn" title="${esc((c.dev.errors||[]).join(' | '))}">⚠</span>` : ""}</td>
          <td style="color:#7c8699">${c.round == null ? "—" : c.round === 0 ? "carried" : c.round}</td>
          <td class="num">${acc(c.dev?.accuracy)}</td>
          <td class="num">${usd(c.dev?.cost_per_query)}</td>
          <td class="num">${acc(c.test?.accuracy)}</td>
          <td class="num">${usd(c.test?.cost_per_query)}</td>
          <td class="num">${pct(c.dev?.cached_input_frac)}</td>
        </tr>`;
      }).join("") + `</tbody></table></div>`);

    const sel = cands.find(c => c.name === selectedCandidate);
    if (sel) {
      parts.push(`<h2>${esc(sel.name)}</h2>`);
      if (sel.description) parts.push(`<div class="desc">${esc(sel.description)}</div>`);
      parts.push(`<div class="tabs">
        <span class="tab ${candView === "code" ? "on" : ""}" onclick="setCandView('code')">code</span>
        <span class="tab ${candView === "diagram" ? "on" : ""}" onclick="setCandView('diagram')">diagram</span>
        <span class="tab ${candView === "dev" ? "on" : ""}" onclick="setCandView('dev')">dev calls</span>
        <span class="tab ${candView === "test" ? "on" : ""}" onclick="setCandView('test')">test calls</span>
      </div>`);
      if (candView === "code") {
        parts.push(sel.code ? `<pre>${esc(sel.code.trim())}</pre>`
                            : `<div class="empty">code is written when the search finishes</div>`);
      } else {
        parts.push(`<div id="trace">${candView === "diagram" ? diagramHtml() : traceHtml()}</div>`);
      }
    }
  }

  if (cands.length > 1) {
    parts.push(`<h2>same example, every workflow
      <span class="tab ${answersSplit === "dev" ? "on" : ""}" style="float:right;text-transform:none;margin-left:6px"
        onclick="showAnswers('dev')">dev</span>
      <span class="tab ${answersSplit === "test" ? "on" : ""}" style="float:right;text-transform:none"
        onclick="showAnswers('test')">test</span></h2>
      <div id="answers">${answersSplit ? answersHtml() :
        `<div class="empty">pick a split to line every workflow's answers up against the
          same questions, most-disagreed first</div>`}</div>`);
    if (answersSplit && (!answersData || answersData._split !== answersSplit)) refreshAnswers();
  }
  if (s.state !== "running") {
    parts.push(`<h2 id="cont-card">continue this search</h2><div class="card">
      <div class="desc">Adds design rounds on top of everything above — the archive,
        research notes, working skills and the exact dev/test splits carry over, so new
        numbers stay comparable and carried test scores aren't paid for twice.</div>
      <div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap">
        <div><div class="io-lbl">more rounds</div>
          <input id="cont-rounds" type="number" min="1" max="10" value="2" style="width:80px"></div>
        <div style="flex:1;min-width:280px"><div class="io-lbl">nudge (optional)</div>
          <textarea id="cont-guidance" rows="3"
            placeholder="Where should the next rounds focus? e.g. the cheap workflows lose points on multi-part questions — try decomposition; stop exploring voting variants."
            style="width:100%;background:#0a0e14;color:#cfd6e4;border:1px solid #2a313c;border-radius:4px;padding:6px;font:inherit;font-size:12px"></textarea></div>
      </div>
      <div style="margin-top:8px"><button class="primary" onclick="continueRun()">continue search</button>
        <span class="err" id="cont-err"></span></div>
    </div>`);
  }
  parts.push(`<h2>task input &amp; grading</h2>` + analysisHtml(d.analysis));
  parts.push(`<h2>config</h2><details><summary>the resolved config this run used</summary>
    <div class="inner"><pre>${esc(d.config || "(none)")}</pre></div></details>`);
  parts.push(`<h2>timeline</h2>` + timelineHtml(d.events || []));

  parts.push(`<h2>log
    <span class="tab ${logLines > 400 ? "on" : ""}" style="float:right;text-transform:none"
      onclick="toggleLog()">${logLines > 400 ? "show tail" : "show full log"}</span></h2>
    <pre id="log">${esc(d.log || "(no output yet)")}</pre>`);

  // Re-rendering wholesale would throw away where the reader had scrolled to.
  // Keep the log's position, unless it was pinned to the bottom — then follow.
  const old = document.getElementById("log");
  const wasPinned = !old || old.scrollHeight - old.scrollTop - old.clientHeight < 40;
  const wasAt = old ? old.scrollTop : 0;
  const pane = document.getElementById("detail");
  const paneAt = pane.scrollTop;
  // Which disclosures were open, so a refresh doesn't collapse what you opened.
  const wasOpen = [...pane.querySelectorAll("details")].map(x => x.open);
  // What was typed into the continue form — a refresh must eat neither the
  // nudge nor the error explaining why the last attempt was refused.
  const contRounds = (document.getElementById("cont-rounds") || {}).value;
  const contGuidance = (document.getElementById("cont-guidance") || {}).value;
  const contError = (document.getElementById("cont-err") || {}).textContent;
  // Heights the reader dragged panes to, so a refresh doesn't snap them back.
  const preHeights = [...pane.querySelectorAll("pre")].map(p => p.style.height);

  pane.innerHTML = parts.join("");
  pane.querySelectorAll("details").forEach((x, i) => { if (wasOpen[i]) x.open = true; });
  const contR = document.getElementById("cont-rounds"), contG = document.getElementById("cont-guidance");
  const contE = document.getElementById("cont-err");
  if (contR && contRounds !== undefined) contR.value = contRounds;
  if (contG && contGuidance !== undefined) contG.value = contGuidance;
  if (contE && contError) contE.textContent = contError;
  pane.scrollTop = paneAt;
  const log = document.getElementById("log");
  if (log) log.scrollTop = wasPinned ? log.scrollHeight : wasAt;
  makeResizable(pane, preHeights);
  wireFrontierHover();
}

// Give overflowing panes a drag-to-resize corner. CSS alone can't: `resize`
// respects max-height, so a capped box could only shrink. A pane that
// overflows its cap trades max-height for an explicit height, which the
// handle then controls; `saved` re-applies heights across the 3s re-render.
function makeResizable(container, saved = []) {
  [...container.querySelectorAll("pre")].forEach((pre, i) => {
    if (saved[i]) {
      pre.style.maxHeight = "none"; pre.style.height = saved[i]; pre.style.resize = "vertical";
    } else if (pre.scrollHeight > pre.clientHeight + 10) {
      pre.style.maxHeight = "none"; pre.style.height = "340px"; pre.style.resize = "vertical";
    }
  });
}

// Selecting a candidate should take you to it, not leave you hunting for it.
function revealSelected() {
  const pane = document.getElementById("detail");
  const heading = [...pane.querySelectorAll("h2")]
    .find(h => h.textContent.trim() === (selectedCandidate || "").trim());
  if (heading) heading.scrollIntoView({behavior: "smooth", block: "start"});
  else {
    const row = pane.querySelector("tr.cand.sel");
    if (row) row.scrollIntoView({behavior: "smooth", block: "center"});
  }
}

function setChartSplit(s) { chartSplit = s; loadDetail(); }
function toggleRound(r) {
  if (hiddenRounds.has(r)) hiddenRounds.delete(r); else hiddenRounds.add(r);
  loadDetail();
}

function stat(lbl, val) {
  return `<div class="card"><div class="lbl">${lbl}</div><div class="stat">${val}</div></div>`;
}

function pick(name) {
  selectedCandidate = selectedCandidate === name ? null : name;
  traceCache = null;
  hoveringChart = false;
  loadDetail().then(() => { if (selectedCandidate) revealSelected(); });
  if (selectedCandidate && candView !== "code") loadTrace();
}

function setCandView(v) { candView = v; traceCache = null; loadDetail(); if (v !== "code") loadTrace(); }
function toggleLog() { logLines = logLines > 400 ? 400 : 20000; loadDetail(); }

// ---- what the workflow was actually asked, and what came back ----------------
// Every model call a candidate made, per example: the prompt in, the reply out.
async function loadTrace() {
  if (!activeId || !selectedCandidate) return;
  const split = candView === "test" ? "test" : "dev";   // the diagram reads dev
  const url = `/api/trace/${encodeURIComponent(activeId)}?name=${encodeURIComponent(selectedCandidate)}&split=${split}`;
  const data = await (await fetch(url)).json();
  traceCache = data.error ? {error: data.error} : data;
  const box = document.getElementById("trace");
  if (box) {
    box.innerHTML = candView === "diagram" ? diagramHtml() : traceHtml();
    makeResizable(box);
  }
}

// ---- the workflow, drawn from what it actually did ---------------------------
// Structure inferred from code would be a guess; the traces are ground truth.
// Each distinct sequence of model calls the workflow took on dev becomes one
// row — so a router shows its branches with real frequencies, an escalator
// shows how often it escalated, and each path carries its own score and cost.
function modelHue(model) {
  const m = String(model).toLowerCase();
  return m.includes("haiku") ? "#86efac" : m.includes("sonnet") ? "#7dd3fc"
       : m.includes("opus") ? "#c4b5fd" : "#8b95a7";
}

function diagramHtml() {
  if (!traceCache) return `<div class="empty">loading calls…</div>`;
  if (traceCache.error) {
    return `<div class="empty">no dev calls recorded for this candidate yet —
            the diagram is drawn from its traces</div>`;
  }
  const groups = {};
  for (const r of traceCache.records || []) {
    const key = r.calls.map(c => c.model).join("→") || "(no model calls)";
    const g = groups[key] = groups[key] || {calls: r.calls.map(c => c.model),
                                            n: 0, score: 0, cost: 0, errors: 0};
    g.n += 1; g.score += r.score; g.cost += r.cost; g.errors += r.error ? 1 : 0;
  }
  const paths = Object.values(groups).sort((a, b) => b.n - a.n);
  const total = paths.reduce((sum, g) => sum + g.n, 0);
  if (!total) return `<div class="empty">no examples recorded</div>`;

  const box = (model, times) => `<span style="border:1px solid ${modelHue(model)};
      color:${modelHue(model)};border-radius:5px;padding:2px 8px;font-size:11px;
      font-family:ui-monospace,Menlo,monospace;white-space:nowrap">${
      esc(String(model).replace(/^claude-/, "").split("-")[0])}${times > 1 ? " ×" + times : ""}</span>`;
  const arrow = `<span style="color:#5b667a">→</span>`;

  const rows = paths.map(g => {
    // Run-length compress consecutive same-model calls: S,S,S -> sonnet ×3,
    // matching how the structural names read (S×3→vote).
    const segments = [];
    for (const model of g.calls) {
      const last = segments[segments.length - 1];
      if (last && last.model === model) last.times += 1;
      else segments.push({model, times: 1});
    }
    const shown = segments.slice(0, 8);
    const chain = g.calls.length
      ? shown.map(s => box(s.model, s.times)).join(arrow)
        + (segments.length > 8 ? arrow + `<span style="color:#7c8699;font-size:11px">+${segments.length - 8} more</span>` : "")
      : `<span style="color:#7c8699;font-size:11px;font-style:italic">no model calls — pure code</span>`;
    const share = g.n / total;
    return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;
        border-bottom:1px solid #1d242e;flex-wrap:wrap">
      <span style="font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#dde3ef;
        min-width:74px">×${g.n} <span style="color:#5b667a">(${(share * 100).toFixed(0)}%)</span></span>
      <span style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;flex:1">${chain}</span>
      <span style="font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#8b95a7">
        score ${(g.score / g.n).toFixed(2)} · ${usd(g.cost / g.n)}/q${
        g.errors ? ` · <span class="warn">${g.errors} error${g.errors > 1 ? "s" : ""}</span>` : ""}</span>
    </div>`;
  }).join("");

  return `<div class="desc">${total} dev example(s), ${paths.length} distinct call
      path(s), most common first. Each row: how many examples took that sequence of
      model calls, its mean score, and mean cost — a router's branches and an
      escalator's escalation rate read directly off the rows.</div>
    <div class="card">${rows}</div>`;
}

function traceHtml() {
  if (!traceCache) return `<div class="empty">loading calls…</div>`;
  if (traceCache.error) {
    return `<div class="empty">no calls recorded for this split yet — traces are written
            as each candidate is scored</div>`;
  }
  const rows = (traceCache.records || []).map((r, i) => {
    const ok = r.score >= 0.999, part = r.score > 0 && !ok;
    const cls = ok ? "pass" : (part ? "part" : "fail");
    return `<details>
      <summary>
        <span class="ex-score ${cls}">${Number(r.score).toFixed(2)}</span>
        <span class="ex-q">${esc(r.question.text.slice(0, 110))}</span>
        <span class="cost" style="color:#7c8699;font-family:ui-monospace,Menlo,monospace;font-size:11px">
          ${usd(r.cost)} · ${r.calls.length} call${r.calls.length === 1 ? "" : "s"}</span>
      </summary>
      <div class="inner">
        ${r.error ? `<div class="err">${esc(r.error)}</div>` : ""}
        <div class="io-lbl">returned</div><pre>${esc(r.answer.text) || "(empty)"}</pre>
        <div class="io-lbl">gold answer</div><pre>${esc(r.gold.text) || "(none)"}</pre>
        <div class="io-lbl">model calls</div>
        ${r.calls.map(callHtml).join("") || `<div class="empty">no model calls</div>`}
      </div></details>`;
  });
  return rows.length ? rows.join("") : `<div class="empty">no examples recorded</div>`;
}

function callHtml(c, i) {
  const clipped = t => t.clipped ? `<span class="clip">clipped — ${t.chars} chars total</span>` : "";
  return `<div class="call">
    <div class="hd"><span class="model">${esc(c.model)}</span>
      <span style="color:#7c8699">call ${i + 1}</span>
      <span class="cost">${usd(c.cost)} · in ${c.usage.input + c.usage.cache_read + c.usage.cache_write} / out ${c.usage.output} tok</span></div>
    <div class="io-lbl">prompt ${clipped(c.prompt)}</div><pre>${esc(c.prompt.text)}</pre>
    <div class="io-lbl">reply ${clipped(c.reply)}</div><pre>${esc(c.reply.text) || "(empty)"}</pre>
  </div>`;
}

// ---- the same example, answered by every workflow ---------------------------
// Accuracy says which workflow won. This says WHERE they differed, which is the
// part worth reading — and whether the dear one is right for a reason.
async function showAnswers(split) {
  answersSplit = answersSplit === split ? "" : split;
  answersData = null;
  loadDetail();
  if (answersSplit) refreshAnswers();
}

// Fetch the matrix for the open split and drop it into place, without a full
// re-render — so the 3s refresh does not blank it, the same lesson as the log
// and the chart tooltip.
async function refreshAnswers() {
  const box = document.getElementById("answers");
  if (!answersData && box) box.innerHTML = `<div class="empty">loading answers…</div>`;
  const data = await (await fetch(
    `/api/answers/${encodeURIComponent(activeId)}?split=${answersSplit}`)).json();
  data._split = answersSplit;
  answersData = data;
  const target = document.getElementById("answers");
  if (target && answersSplit) { target.innerHTML = answersHtml(); makeResizable(target); }
}

function answersHtml() {
  const d = answersData;
  if (!d) return `<div class="empty">loading…</div>`;
  if (d.error || d.note) return `<div class="empty">${esc(d.error || d.note)}</div>`;
  if (!d.rows.length) return `<div class="empty">no examples recorded on this split</div>`;

  const head = d.candidates.map(n =>
    `<th class="acol">${esc(n)}</th>`).join("");
  const body = d.rows.map((r, i) => {
    const cells = r.cells.map(c => {
      if (!c) return `<td class="acell"><span class="empty">not scored</span></td>`;
      const cls = c.score >= 0.999 ? "pass" : (c.score > 0 ? "part" : "fail");
      return `<td class="acell ${cls}">
        <div class="asc">${c.score.toFixed(2)}${c.error ? " ⚠" : ""}</div>
        <div class="atxt">${esc((c.answer || "(empty)").slice(0, 260))}${c.clipped ? "…" : ""}</div></td>`;
    }).join("");
    return `<tr>
      <td class="aq">
        <details><summary>${esc(r.question.slice(0, 90))}${r.question.length > 90 ? "…" : ""}</summary>
          <div class="inner"><pre>${esc(r.question)}</pre>
            <div class="io-lbl">gold</div><pre>${esc(r.gold || "(none)")}</pre></div></details>
        ${r.spread > 0 ? `<span class="tag" style="background:#2a2014;color:#fbbf24;border-color:#7a5018">they disagree</span>` : ""}
      </td>${cells}</tr>`;
  }).join("");

  return `<div class="desc">${d.rows.length} example(s) on ${esc(d.split)}, the ones they
      disagree on first. Click a question to read it in full.</div>
    <div class="card answers-scroll" style="padding:0">
      <table class="answers"><thead><tr><th class="qhead">question</th>${head}</tr></thead>
      <tbody>${body}</tbody></table></div>`;
}

// ---- the task as the designer and grader see it -----------------------------
function analysisHtml(a) {

  const sample = (items, label) => items && items.length
    ? `<div class="io-lbl">${label}</div>` + items.map(x =>

    ${a.answer_examples && a.answer_examples.length

         <pre>${esc(a.answer_examples.join("\n"))}</pre>` : ""}
    ${sample(a.dev_sample, "dev examples (first 3)")}

function timelineHtml(events) {
  if (!events.length) return `<div class="empty">nothing yet</div>`;
  const t0 = events[0].t;
  return `<div class="card" style="padding:0"><table><tbody>` + events.map(e => {
    const detail = e.event === "candidate"
      ? `${e.name} — dev ${acc(e.dev_accuracy)}, ${usd(e.dev_cost)}`
      : e.event === "test_scored" ? `${e.name} — test ${acc(e.test_accuracy)}, ${usd(e.test_cost)}`
      : e.event === "analyzed" ? `${e.check} · ${e.n_dev} dev / ${e.n_test} test`
      : e.event === "researched" ? `research notes written (${e.chars} chars)`
      : e.event === "round_start" ? `round ${e.round} of ${e.rounds}`
      : e.event === "ranking" ? `${e.n_finalists} finalist(s) on the dev frontier`
      : e.event === "continued_from" ? `from ${e.source}`
        + (e.guidance ? ` — nudge: ${e.guidance.slice(0, 100)}` : "")
      : e.error || "";
    return `<tr><td style="width:60px;color:#5b667a;font-family:ui-monospace,Menlo,monospace">
        +${Math.round(e.t - t0)}s</td>
      <td style="width:110px;color:#fbbf24;font-size:11px">${esc(e.event)}</td>
      <td style="color:#bdc4d3">${esc(detail)}</td></tr>`;
  }).join("") + `</tbody></table></div>`;
}

// ---- convergence by round ----------------------------------------------------
// Best dev accuracy in the archive after each round, as a step chart. Flat
// segments answer "should I buy another round?" at a glance. Round 0 is a
// continued run's carried archive.
function convergenceSvg(events) {
  const byRound = {};
  for (const e of events) {
    if (e.event === "candidate" && e.dev_accuracy != null)
      (byRound[e.round ?? -1] = byRound[e.round ?? -1] || []).push(e.dev_accuracy);
  }
  const rounds = Object.keys(byRound).map(Number).sort((a, b) => a - b);
  if (rounds.length < 2) return "";           // one round has nothing to converge
  let best = 0;
  const steps = rounds.map(r => {
    best = Math.max(best, ...byRound[r]);
    return {round: r, best, added: byRound[r].length};
  });

  const W = 760, H = 170, P = {l: 56, r: 24, t: 16, b: 40};
  const lo = Math.max(0, Math.min(...steps.map(s => s.best)) - 0.05);
  const hi = Math.min(1, Math.max(...steps.map(s => s.best)) + 0.05);
  const x = i => P.l + (steps.length === 1 ? 0 : i / (steps.length - 1)) * (W - P.l - P.r);
  const y = a => H - P.b - (a - lo) / (hi - lo || 1) * (H - P.t - P.b);

  const grid = [0, 1, 2, 3].map(i => {
    const a = lo + (hi - lo) * i / 3;
    return `<line x1="${P.l}" y1="${y(a).toFixed(1)}" x2="${W - P.r}" y2="${y(a).toFixed(1)}" stroke="#1d242e"/>
      <text x="${P.l - 8}" y="${(y(a) + 3).toFixed(1)}" fill="#5b667a" font-size="10" text-anchor="end">${a.toFixed(2)}</text>`;
  }).join("");
  const path = steps.map((s, i) =>                     // step-after line
    (i ? `H${x(i).toFixed(1)} ` : `M${x(0).toFixed(1)},${y(s.best).toFixed(1)} `)
    + (i ? `V${y(s.best).toFixed(1)} ` : "")).join("");
  const marks = steps.map((s, i) => {
    const improved = i === 0 || s.best > steps[i - 1].best + 1e-9;
    return `<circle cx="${x(i).toFixed(1)}" cy="${y(s.best).toFixed(1)}" r="4"
        fill="${improved ? "#86efac" : "#5b667a"}" stroke="#0e1116" stroke-width="1.5"/>
      <text x="${x(i).toFixed(1)}" y="${(y(s.best) - 9).toFixed(1)}" fill="${improved ? "#86efac" : "#8b95a7"}"
        font-size="10" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">${s.best.toFixed(2)}</text>
      <text x="${x(i).toFixed(1)}" y="${H - P.b + 14}" fill="#7c8699" font-size="10" text-anchor="middle">${
        s.round === 0 ? "carried" : s.round === -1 ? "?" : "round " + s.round}</text>
      <text x="${x(i).toFixed(1)}" y="${H - P.b + 26}" fill="#5b667a" font-size="9" text-anchor="middle">+${s.added} cand</text>`;
  }).join("");

  return `<div class="card"><svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    ${grid}<path d="${path}" fill="none" stroke="#7dd3fc" stroke-width="1.5"/>${marks}</svg></div>`;
}

// ---- where the money went ----------------------------------------------------
// Per-run spend from the event log: the agent's own sessions (research is the
// round-0 agent_cost) plus candidate scoring. Task analysis, data generation,
// and judge calls aren't metered into events, so they are named as not shown
// rather than silently omitted.
function spendHtml(d) {
  const status = d.status || {};
  let research = 0, design = 0, dev = 0, test = 0;
  for (const e of d.events || []) {
    if (e.event === "agent_cost") {
      if (e.round === 0) research += e.usd || 0; else design += e.usd || 0;
    } else if (e.event === "candidate" && e.round !== 0) {
      dev += (e.dev_cost || 0) * (status.n_dev || 0);   // round 0 = carried: paid by the source run
    } else if (e.event === "test_scored" && !e.kept) {
      test += (e.test_cost || 0) * (status.n_test || 0);
    }
  }
  const parts = [["research agent", research, "#7dd3fc"], ["design agent", design, "#c4b5fd"],
                 ["dev scoring", dev, "#86efac"], ["test scoring", test, "#fbbf24"]]
    .filter(([, v]) => v > 0);
  const total = parts.reduce((sum, [, v]) => sum + v, 0);
  if (!total) return "";
  const bar = parts.map(([name, v, color]) =>
    `<div title="${esc(name)}: $${v.toFixed(2)}"
       style="width:${(100 * v / total).toFixed(2)}%;background:${color}"></div>`).join("");
  const legend = parts.map(([name, v, color]) =>
    `<span style="margin-right:14px"><span style="display:inline-block;width:9px;height:9px;
       border-radius:2px;background:${color};margin-right:5px"></span>${esc(name)}
       <span style="font-family:ui-monospace,Menlo,monospace;color:#dde3ef">$${v.toFixed(2)}</span></span>`).join("");
  return `<div class="card">
    <div style="display:flex;height:18px;border-radius:4px;overflow:hidden;margin-bottom:8px">${bar}</div>
    <div style="font-size:11px;color:#8b95a7">${legend}
      <span style="float:right">total <span style="font-family:ui-monospace,Menlo,monospace;
        color:#dde3ef">$${total.toFixed(2)}</span></span></div>
    <div class="desc" style="margin-top:6px;margin-bottom:0">Spend recorded in the event log.
      Task analysis, data generation, and judge grading calls aren't metered per-run
      and are not shown. A continuation's carried candidates cost nothing here —
      their scoring was paid for by the source run.</div>
  </div>`;
}

// ---- frontier plot (inline SVG, no libraries) --------------------------------
// The non-dominated candidates on a given split — computed here so the frontier
// line is correct for whichever split is shown, not only for the saved test one.
function paretoNames(cands, at) {
  const names = new Set();
  for (const c of cands) {
    const m = at(c);
    const dominated = cands.some(o => o !== c
      && at(o).cost_per_query <= m.cost_per_query && at(o).accuracy >= m.accuracy
      && (at(o).cost_per_query < m.cost_per_query || at(o).accuracy > m.accuracy));
    if (!dominated) names.add(c.name);
  }
  return names;
}

function frontierSvg(cands, split) {
  const at = c => c[split];
  const frontierNames = paretoNames(cands, at);
  // Room on the right for labels, which sit beside their point rather than in a
  // legend — a legend makes you match colours back to rows, and only ever listed
  // the frontier.
  const W = 760, H = 340, P = {l: 56, r: 150, t: 16, b: 42};
  const costs = cands.map(c => at(c).cost_per_query), accs = cands.map(c => at(c).accuracy);
  const c0 = Math.min(...costs), c1 = Math.max(...costs);
  const a0 = Math.min(...accs), a1 = Math.max(...accs);
  const cPad = (c1 - c0) * .15 || Math.max(c0 * .15, 1e-5);
  const aPad = (a1 - a0) * .15 || .05;
  const cLo = Math.max(0, c0 - cPad), cHi = c1 + cPad;
  const aLo = Math.max(0, a0 - aPad), aHi = Math.min(1, a1 + aPad);
  const x = c => P.l + (cHi === cLo ? .5 : (c - cLo) / (cHi - cLo)) * (W - P.l - P.r);
  const y = a => H - P.b - (aHi === aLo ? .5 : (a - aLo) / (aHi - aLo)) * (H - P.t - P.b);

  const front = cands.filter(c => frontierNames.has(c.name))
                     .sort((p, q) => at(p).cost_per_query - at(q).cost_per_query);
  const line = front.map((c, i) =>
    `${i ? "L" : "M"}${x(at(c).cost_per_query).toFixed(1)},${y(at(c).accuracy).toFixed(1)}`).join(" ");

  const ticks = [];
  for (let i = 0; i <= 3; i++) {
    const a = aLo + (aHi - aLo) * i / 3, c = cLo + (cHi - cLo) * i / 3;
    ticks.push(`<line x1="${P.l}" y1="${y(a).toFixed(1)}" x2="${W - P.r}" y2="${y(a).toFixed(1)}" stroke="#1d242e"/>
      <text x="${P.l - 8}" y="${(y(a) + 3).toFixed(1)}" fill="#5b667a" font-size="10" text-anchor="end">${a.toFixed(2)}</text>
      <text x="${x(c).toFixed(1)}" y="${H - P.b + 15}" fill="#5b667a" font-size="10" text-anchor="middle">$${c.toFixed(4)}</text>`);
  }

  // Label every point with its name. Nudge labels that would collide, so two
  // candidates at the same accuracy stay readable.
  const placed = [];
  const marks = cands.map((c, i) => {
    const px = x(at(c).cost_per_query), py = y(at(c).accuracy);
    const on = frontierNames.has(c.name);
    let ly = py + 3;
    while (placed.some(v => Math.abs(v - ly) < 11)) ly += 11;
    placed.push(ly);
    const flip = px > W - P.r - 60;          // near the right edge, label leftwards
    return `<circle class="fp" data-i="${i}" cx="${px.toFixed(1)}" cy="${py.toFixed(1)}"
        r="${on ? 5.5 : 4}" fill="${on ? "#d9534f" : "#5b667a"}" stroke="#0e1116"
        stroke-width="1.5" style="cursor:pointer"/>
      <text class="fl" data-i="${i}" x="${(flip ? px - 9 : px + 9).toFixed(1)}" y="${ly.toFixed(1)}"
        text-anchor="${flip ? "end" : "start"}" font-size="10"
        font-family="ui-monospace,Menlo,monospace" fill="${on ? "#f0a3a1" : "#8b95a7"}"
        style="cursor:pointer">${esc(c.name.slice(0, 22))}</text>`;
  }).join("");

  frontierPoints = cands.map(c => ({...c, _split: split}));
  return `<div class="card" style="position:relative">
    <svg id="fsvg" viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
      ${ticks.join("")}
      <path d="${line}" fill="none" stroke="#d9534f" stroke-width="1.5"/>
      ${marks}
      <text x="${(P.l + W - P.r) / 2}" y="${H - 5}" fill="#7c8699" font-size="10" text-anchor="middle">cost per query (USD)</text>
      <text x="14" y="${H / 2}" fill="#7c8699" font-size="10" text-anchor="middle"
        transform="rotate(-90 14 ${H / 2})">accuracy</text>
    </svg>
    <div id="ftip" class="tip"></div></div>`;
}

// Both charts hover the same way. Native <title> was used here before: it needs
// a full second of stillness, never fires on a moving pointer, and cannot be
// styled — which is why it read as "no tooltip at all".
function wireFrontierHover() {
  const svg = document.getElementById("fsvg"), tip = document.getElementById("ftip");
  if (!svg || !tip) return;
  svg.querySelectorAll(".fp, .fl").forEach(node => {
    node.addEventListener("mouseenter", () => {
      const c = frontierPoints[+node.dataset.i];
      const s = c._split, other = s === "test" ? c.dev : c.test;
      hoveringChart = true;
      tip.innerHTML = `<b style="color:#dde3ef">${esc(c.name)}</b>
        ${c.round != null ? `<div style="color:#7c8699">${c.round === 0
          ? "carried from the source run" : "designed in round " + c.round}</div>` : ""}
        <div>accuracy <b>${acc(c[s].accuracy)}</b> · ${usd(c[s].cost_per_query)}/query
          <span style="color:#7c8699">(${esc(s)})</span></div>
        ${other ? `<div style="color:#7c8699">${esc(s === "test" ? "dev" : "test")}:
          ${acc(other.accuracy)} · ${usd(other.cost_per_query)}</div>` : ""}
        ${c[s].cached_input_frac ? `<div style="color:#7c8699">cached input
          ${pct(c[s].cached_input_frac)}</div>` : ""}
        ${(c[s].errors || []).length ? `<div class="warn">${esc(c[s].errors[0])}</div>` : ""}
        ${c.description ? `<div style="color:#8b95a7;margin-top:3px">${esc(c.description.slice(0, 150))}</div>` : ""}
        <div style="color:#5b667a;margin-top:3px">click to see its code and calls</div>`;
      const box = svg.getBoundingClientRect(), r = node.getBoundingClientRect();
      tip.style.display = "block";
      tip.style.left = Math.min(r.left - box.left + 12, box.width - 320) + "px";
      tip.style.top = Math.max(0, r.top - box.top - 8) + "px";
    });
    node.addEventListener("mouseleave", () => {
      tip.style.display = "none";
      hoveringChart = false;
    });
    node.addEventListener("click", () => {
      // Clicking means hovering, and hovering pauses re-render — so release the
      // guard here or the click does nothing at all.
      hoveringChart = false;
      tip.style.display = "none";
      selectedCandidate = frontierPoints[+node.dataset.i].name;
      loadDetail().then(revealSelected);
    });
  });
}

// ---- compare: every run's candidates on one chart ---------------------------
// The server aggregates every scored candidate from every run; this draws them
// on shared axes — log cost, since tasks differ by orders of magnitude — so
// searches on the same benchmark (or different ones) can be read together, and
// against routerllm's reference accuracies when filtered to one task.
let compareData = null;

function setView(v) {
  view = v;
  document.getElementById("tab-runs").classList.toggle("on", v === "runs");
  document.getElementById("tab-compare").classList.toggle("on", v === "compare");
  if (v === "runs" && !activeId)
    document.getElementById("detail").innerHTML =
      `<div class="empty">select a run, or start a new one</div>`;
  tick();
}

async function loadCompare() {
  if (hoveringChart) return;      // same rule as the run chart: don't re-render mid-hover
  compareData = await (await fetch("/api/compare")).json();
  renderCompare();
}

function setCompareTask(t) { compareTask = t; renderCompare(); }

// A fixed palette cycled by task, so a task keeps its colour as runs accumulate.
const TASK_COLORS = ["#7dd3fc","#86efac","#fbbf24","#fca5a5","#c4b5fd","#f9a8d4",
                     "#5eead4","#fdba74","#a5b4fc","#bef264","#67e8f9","#f0abfc"];
const taskColor = (t, tasks) => TASK_COLORS[tasks.indexOf(t) % TASK_COLORS.length];

function renderCompare() {
  const pane = document.getElementById("detail");
  if (!compareData) { pane.innerHTML = `<div class="empty">loading…</div>`; return; }
  const all = compareData.points || [];
  if (!all.length) {
    pane.innerHTML = `<div class="empty">nothing to compare yet —
      points appear here as runs score candidates</div>`;
    return;
  }
  const tasks = [...new Set(all.map(p => p.task))].sort();
  if (compareTask && !tasks.includes(compareTask)) compareTask = "";
  const points = compareTask ? all.filter(p => p.task === compareTask) : all;
  const tabs = [`<span class="tab ${compareTask ? "" : "on"}"
      onclick="setCompareTask('')">all tasks</span>`]
    .concat(tasks.map(t => `<span class="tab ${compareTask === t ? "on" : ""}"
      style="color:${taskColor(t, tasks)}" data-t="${esc(t)}"
      onclick="setCompareTask(this.dataset.t)">${esc(t)}</span>`)).join("");
  const base = compareTask ? (compareData.baselines || {})[compareTask] || {} : {};

  pane.innerHTML = `<h2 style="margin-top:0">every candidate, every run</h2>
    <div class="desc">One point per candidate per run — filled circles are held-out
      test scores, hollow ones dev-only; the larger points sat on their run's
      frontier. Cost is log-scaled. Hover for details, click to open the run.${
      compareTask ? " Dashed lines are routerllm's reference accuracies for this task." : ""}</div>
    <div class="tabs">${tabs}</div>
    ${compareSvg(points, tasks, base)}`;
  wireCompareHover();
}

let comparePts = [];              // what the hover handlers read, by data-i

function compareSvg(points, tasks, baselines) {
  const W = 760, H = 400, P = {l: 56, r: 110, t: 16, b: 42};
  const lx = p => Math.log10(Math.max(p.cost, 1e-6));
  const xs = points.map(lx);
  let x0 = Math.min(...xs), x1 = Math.max(...xs);
  if (x1 - x0 < .5) { x0 -= .5; x1 += .5; }   // one lone cluster still gets width
  const xPad = (x1 - x0) * .06;
  x0 -= xPad; x1 += xPad;

  // Reference accuracies stretch the y range too, so a baseline above (or below)
  // every measured point is still drawn on-plot rather than clipped away.
  const refs = Object.entries(baselines)
    .filter(([k, v]) => k !== "n" && v != null)
    .sort((a, b) => b[1] - a[1]);
  const accs = points.map(p => p.accuracy).concat(refs.map(([, v]) => Number(v)));
  const a0 = Math.min(...accs), a1 = Math.max(...accs);
  const aPad = (a1 - a0) * .12 || .05;
  const aLo = Math.max(0, a0 - aPad), aHi = Math.min(1, a1 + aPad);
  const x = v => P.l + (v - x0) / (x1 - x0) * (W - P.l - P.r);
  const y = a => H - P.b - (a - aLo) / (aHi - aLo) * (H - P.t - P.b);
  // Two significant figures, however small the decade — toFixed(5) rendered the
  // $0.000001 decade as "$0.00000".
  const fmt = c => "$" + (c >= 1 ? c.toFixed(2) : Number(c.toPrecision(2)).toString());

  const ticks = [];
  for (let i = 0; i <= 3; i++) {
    const a = aLo + (aHi - aLo) * i / 3;
    ticks.push(`<line x1="${P.l}" y1="${y(a).toFixed(1)}" x2="${W - P.r}" y2="${y(a).toFixed(1)}" stroke="#1d242e"/>
      <text x="${P.l - 8}" y="${(y(a) + 3).toFixed(1)}" fill="#5b667a" font-size="10" text-anchor="end">${a.toFixed(2)}</text>`);
  }
  // Decade lines on the log cost axis; a narrow range gets even ticks instead,
  // so the axis never dwindles to a single lonely label.
  let decades = [];
  for (let d = Math.ceil(x0); d <= Math.floor(x1); d++) decades.push(d);
  if (decades.length < 2)
    decades = [.12, .38, .62, .88].map(f => x0 + (x1 - x0) * f);
  for (const d of decades) {
    ticks.push(`<line x1="${x(d).toFixed(1)}" y1="${P.t}" x2="${x(d).toFixed(1)}" y2="${H - P.b}" stroke="#1d242e"/>
      <text x="${x(d).toFixed(1)}" y="${H - P.b + 15}" fill="#5b667a" font-size="10" text-anchor="middle">${fmt(10 ** d)}</text>`);
  }

  // routerllm's reference accuracies, as dashed lines labelled on the right —
  // nudged apart when two (haiku and router, often) share a value.
  const placedRef = [];
  const refLines = refs.map(([name, v]) => {
    let ly = y(v) + 3;
    while (placedRef.some(o => Math.abs(o - ly) < 11)) ly += 11;
    placedRef.push(ly);
    return `<line x1="${P.l}" y1="${y(v).toFixed(1)}" x2="${W - P.r}" y2="${y(v).toFixed(1)}"
        stroke="#7c8699" stroke-dasharray="4 4" stroke-width="1"/>
      <text x="${W - P.r + 6}" y="${ly.toFixed(1)}" fill="#8b95a7" font-size="10">${esc(name)} ${Number(v).toFixed(2)}</text>`;
  }).join("");

  const marks = points.map((p, i) => {
    const color = taskColor(p.task, tasks);
    const test = p.split === "test";
    return `<circle class="cp" data-i="${i}" cx="${x(lx(p)).toFixed(1)}" cy="${y(p.accuracy).toFixed(1)}"
      r="${p.frontier ? 5 : 3.5}" fill="${test ? color : "none"}" fill-opacity=".85"
      stroke="${color}" stroke-width="1.5" style="cursor:pointer"/>`;
  }).join("");

  comparePts = points;
  return `<div class="card" style="position:relative">
    <svg id="csvg" viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
      ${ticks.join("")}${refLines}${marks}
      <text x="${(P.l + W - P.r) / 2}" y="${H - 5}" fill="#7c8699" font-size="10" text-anchor="middle">cost per query (USD, log scale)</text>
      <text x="14" y="${H / 2}" fill="#7c8699" font-size="10" text-anchor="middle"
        transform="rotate(-90 14 ${H / 2})">accuracy</text>
    </svg>
    <div id="ctip" class="tip"></div></div>`;
}

function wireCompareHover() {
  const svg = document.getElementById("csvg"), tip = document.getElementById("ctip");
  if (!svg || !tip) return;
  svg.querySelectorAll(".cp").forEach(node => {
    node.addEventListener("mouseenter", () => {
      const p = comparePts[+node.dataset.i];
      hoveringChart = true;
      tip.innerHTML = `<b style="color:#dde3ef;font-family:ui-monospace,Menlo,monospace">${esc(p.name)}</b>
        <div><span style="color:${taskColor(p.task, [...new Set(comparePts.map(q => q.task))].sort())}">${esc(p.task)}</span>
          · ${esc(p.run_id)}</div>
        <div>accuracy <b>${acc(p.accuracy)}</b> · ${usd(p.cost)}/query
          <span style="color:#7c8699">(${esc(p.split)})</span>
          ${p.frontier ? `<span class="tag">frontier</span>` : ""}</div>
        ${p.description ? `<div style="color:#8b95a7;margin-top:3px">${esc(p.description.slice(0, 150))}</div>` : ""}
        <div style="color:#5b667a;margin-top:3px">click to open this run</div>`;
      const box = svg.getBoundingClientRect(), r = node.getBoundingClientRect();
      tip.style.display = "block";
      tip.style.left = Math.min(r.left - box.left + 12, box.width - 320) + "px";
      tip.style.top = Math.max(0, r.top - box.top - 8) + "px";
    });
    node.addEventListener("mouseleave", () => {
      tip.style.display = "none";
      hoveringChart = false;
    });
    node.addEventListener("click", async () => {
      // Same release as the run chart: hovering pauses re-render, so let go
      // before navigating or the click paints nothing.
      hoveringChart = false;
      tip.style.display = "none";
      const p = comparePts[+node.dataset.i];
      activeId = p.run_id;
      selectedCandidate = p.name;
      view = "runs";
      document.getElementById("tab-runs").classList.add("on");
      document.getElementById("tab-compare").classList.remove("on");
      await tick();
      revealSelected();
    });
  });
}

// ---- polling ----------------------------------------------------------------
async function tick() {
  await loadRuns();
  if (view === "compare") await loadCompare(); else await loadDetail();
}
function startTimer() { if (!timer) timer = setInterval(tick, 3000); }
function stopTimer() { clearInterval(timer); timer = null; }
document.getElementById("autorefresh").addEventListener("change", e =>
  e.target.checked ? startTimer() : stopTimer());
document.getElementById("newbtn").addEventListener("click", toggleNew);
tick(); startTimer();
</script>
</body>
</html>
